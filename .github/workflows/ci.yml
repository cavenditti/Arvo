name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (fmt, clippy, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain from rust-toolchain.toml
        run: rustup show active-toolchain
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  app:
    name: App (tsc, lint, web export)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npx expo export --platform web

  smoke:
    name: End-to-end smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain from rust-toolchain.toml
        working-directory: backend
        run: rustup show active-toolchain
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Start PostGIS
        run: docker compose -f infra/docker-compose.yml up -d --wait
      - name: Migrate + seed
        working-directory: backend
        run: |
          cargo run -p arvo-api -- migrate
          cargo run -p arvo-api -- seed --demo
      # Part C2 of the smoke run shells out to `cargo run -p arvo-worker -- run --once`.
      # Building it here keeps compile errors out of the smoke log and off the smoke timing.
      - name: Build worker
        working-directory: backend
        run: cargo build -p arvo-worker
      - name: Serve API
        working-directory: backend
        run: |
          cargo run -p arvo-api -- serve &
          for i in $(seq 1 60); do
            curl -fsS -o /dev/null http://localhost:8787/healthz && exit 0
            sleep 1
          done
          echo "API never became healthy" >&2; exit 1
      - name: Run smoke
        run: bash scripts/smoke.sh
